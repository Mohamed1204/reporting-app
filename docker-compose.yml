services:
  # ---- SQL Server database ----
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Password123"
    ports:
      - "1433:1433"            # optional: lets you connect from SSMS/Azure Data Studio on the host
    volumes:
      - mssql-data:/var/opt/mssql   # persist the DB across container restarts
    healthcheck:
      # SQL Server takes ~20-30s to be ready; this lets the API wait for it
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- ASP.NET backend ----
  api:
    build: ./ReportingApi1            # build context = the backend folder (uses its Dockerfile)
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"   # enables Swagger + the dev seed
      ConnectionStrings__DefaultConnection: "Server=db;Database=VatReportingDb;User Id=sa;Password=Your_Strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy   # wait until SQL Server actually accepts connections

  # ---- Vue frontend (nginx) ----
  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  mssql-data:
